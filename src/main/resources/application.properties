# -- Topic names: input --------------------------------------------------------
topic.medicinal.products=hci.medicinal-products.avro
topic.price.updates=hci.price-updates.avro
topic.drug.alerts=hci.drug-alerts.avro

# -- Topic names: output -------------------------------------------------------
topic.price.anomalies=hci.prices.anomalies.avro
topic.alert.enriched=hci.alerts.enriched.avro
topic.narcotics.alerts=hci.alerts.narcotics.avro
topic.product.alert.summary=hci.products.alert-summary.avro
topic.price.surge.notifications=hci.prices.surge-notifications.avro

# -- Topic names: dead-letter queues -------------------------------------------
topic.dlq.price.updates=hci.dlq.price-updates.avro
topic.dlq.drug.alerts=hci.dlq.drug-alerts.avro
topic.dlq.medicinal.products=hci.dlq.medicinal-products.avro

# -- State store names ---------------------------------------------------------
store.product.catalog=product-catalog-store
store.alert.counts=alert-counts-store
store.price.history=price-history-store

# -- Processing rules ----------------------------------------------------------
# Price surge threshold: emit notification when public price increases by more
# than this percentage in a single PriceUpdate event.
price.surge.threshold.percent=15.0

# Alert frequency window duration in minutes (tumbling window size).
alert.window.duration.minutes=60

# Maximum retries before routing a record to the dead-letter queue.
dlq.max.retries=3
